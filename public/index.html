<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#f5f5f5" />
  <title>bitácora</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body data-section="texto">
  <header class="topbar">
    <h1>bitácora<span class="cursor">_</span></h1>
    <nav class="sections">
      <a href="#texto" id="nav-texto" class="section-link">texto</a>
      <a href="#audio" id="nav-audio" class="section-link">audio</a>
    </nav>
    <div class="topbar-actions">
      <input type="search" id="search" placeholder="buscar…" />
      <button id="logout" class="ghost" title="salir">salir</button>
    </div>
  </header>

  <!-- ======================= sección TEXTO (azul) ======================= -->
  <main class="page view" data-view="texto">
    <!-- composer: bloques de texto agrupados bajo un título, como notas8 -->
    <section class="composer writer-only">
      <input type="text" id="texto-title" placeholder="título (opcional, los #tags cuentan)" />
      <div id="texto-draft" class="draft-blocks"></div>
      <div class="composer-bar">
        <button id="texto-add" class="ghost">+ texto</button>
        <span class="spacer"></span>
        <button id="texto-publish" class="publish-btn" disabled>publicar</button>
      </div>
    </section>

    <div id="texto-tagbar" class="tagbar"></div>

    <section id="texto-feed" class="feed"></section>
    <button id="texto-more" class="ghost more-btn" hidden>más</button>
  </main>

  <!-- ======================= sección AUDIO (rojo) ======================= -->
  <div class="view" data-view="audio" hidden>
    <!-- pantalla intermedia: topbar + composer + nubes = 100dvh. El composer
         va ARRIBA (como en texto): grabas o subes audios, cada uno se
         transcribe con whisper y el texto queda editable antes de publicar.
         Las nubes (@'s izquierda, #'s derecha; en móvil arriba/abajo) toman
         lo que el composer les deja, y nacen vacías: todo irá apareciendo
         poco a poco. Cada clic acota el carrete que espera más abajo. -->
    <div class="audio-hero">
      <section class="composer writer-only">
        <input type="text" id="audio-title" placeholder="título (opcional, los #tags cuentan)" />
        <div id="audio-draft" class="draft-blocks"></div>
        <div class="composer-bar">
          <button id="record" class="record-btn">● grabar</button>
          <button id="add-file" class="ghost">+ archivo</button>
          <input type="file" id="file-input" accept="audio/*" multiple hidden />
          <span class="spacer"></span>
          <button id="audio-publish" class="publish-btn" disabled>publicar</button>
        </div>
      </section>

      <section class="clouds">
        <div class="cloud" id="cloud-mentions" aria-label="menciones"></div>
        <div class="cloud" id="cloud-tags" aria-label="temas"></div>
        <div class="clouds-foot">
          <button id="clear-filters" class="ghost" hidden>× limpiar filtros</button>
          <span id="clouds-count"></span>
          <span id="down-hint" class="down-hint" aria-hidden="true" hidden>↓</span>
        </div>
      </section>
    </div>

    <main class="page audio-page">
      <section id="audio-feed" class="feed"></section>
      <button id="audio-more" class="ghost more-btn" hidden>más</button>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
